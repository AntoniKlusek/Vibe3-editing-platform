apiVersion: apps/v1
kind: Deployment
metadata:
  name: transcoding-worker
  labels:
    app: transcoding-worker
spec:
  replicas: 2             # Initial replicas — KEDA ScaledObject takes over afterwards
  selector:
    matchLabels:
      app: transcoding-worker
  template:
    metadata:
      labels:
        app: transcoding-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/your-org/Vibe3-worker:latest  # replace with your registry
          imagePullPolicy: Always
          ports:
            - containerPort: 3001  # Health check port
          env:
            - name: NODE_ENV
              value: production
            - name: WORKER_CONCURRENCY
              value: "2"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: Vibe3-secrets
                  key: REDIS_URL
            - name: R2_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: Vibe3-secrets
                  key: R2_ACCOUNT_ID
            - name: R2_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: Vibe3-secrets
                  key: R2_ACCESS_KEY_ID
            - name: R2_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: Vibe3-secrets
                  key: R2_SECRET_ACCESS_KEY
            - name: R2_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: Vibe3-secrets
                  key: R2_BUCKET_NAME
            - name: R2_PUBLIC_URL
              valueFrom:
                secretKeyRef:
                  name: Vibe3-secrets
                  key: R2_PUBLIC_URL
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: Vibe3-secrets
                  key: SUPABASE_URL
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: Vibe3-secrets
                  key: SUPABASE_SERVICE_ROLE_KEY
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp/Vibe3
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 20Gi   # Max disk per pod for FFmpeg temp files
